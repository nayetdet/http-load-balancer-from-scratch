<!DOCTYPE html>
<html>
  <head>
    <title>Sample App</title>
    <style>
      body {
          background-color: {{ background_color }};
          margin: 0;
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: sans-serif;
      }

      .card {
          background: rgba(255,255,255,.9);
          padding: 2rem;
          border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Instance Information</h1>
      <p><strong>UUID:</strong> {{ instance_id }}</p>
      <p>
        <strong>Started At:</strong>
        {{ started_at }}
      </p>
    </div>
  </body>
</html>
