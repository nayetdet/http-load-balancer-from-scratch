apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: http-target-discovery
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
